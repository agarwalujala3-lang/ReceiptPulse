AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ReceiptPulse serverless receipt intelligence platform

Parameters:
  ConfidenceThreshold:
    Type: Number
    Default: 85
    Description: Minimum extraction confidence before a receipt is routed to manual review.
  SnapshotCacheTtlSeconds:
    Type: Number
    Default: 45
    Description: Warm cache TTL for dashboard snapshot responses.
  ReadObjectMetadata:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Read uploader metadata from the uploaded S3 object before processing.
  CognitoDomainPrefix:
    Type: String
    Description: Globally unique Cognito hosted UI domain prefix for ReceiptPulse sign-in.
  FrontendCallbackUrl:
    Type: String
    Description: Exact dashboard URL that Cognito should redirect back to after sign-in.
  FrontendLogoutUrl:
    Type: String
    Description: Exact dashboard URL that Cognito should redirect back to after sign-out.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref ReceiptTable
        CONFIDENCE_THRESHOLD: !Ref ConfidenceThreshold
        SNAPSHOT_CACHE_TTL_SECONDS: !Ref SnapshotCacheTtlSeconds
        READ_OBJECT_METADATA: !Ref ReadObjectMetadata
        RECEIPT_BUCKET: !Ref ReceiptBucket

Resources:
  ReceiptBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - GET
              - HEAD
            AllowedOrigins:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 300
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  ReceiptDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: receiptpulse-dlq

  ReceiptTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: receipt_id
          AttributeType: S
        - AttributeName: duplicate_key
          AttributeType: S
        - AttributeName: expense_month
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: processed_timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: receipt_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DuplicateKeyIndex
          KeySchema:
            - AttributeName: duplicate_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ExpenseMonthIndex
          KeySchema:
            - AttributeName: expense_month
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: UserReceiptIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: processed_timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ReceiptIdentityUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      LambdaConfig:
        PreSignUp: !GetAtt ReceiptPreSignupTriggerFunction.Arn
      UsernameConfiguration:
        CaseSensitive: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          Required: false
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: admin_only
            Priority: 1

  ReceiptIdentityUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref ReceiptIdentityUserPool
      ClientName: receiptpulse-dashboard
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Ref FrontendCallbackUrl
      LogoutURLs:
        - !Ref FrontendLogoutUrl

  ReceiptIdentityUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref ReceiptIdentityUserPool

  ReceiptPreSignupTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: cognito_pre_signup.lambda_handler

  ReceiptPreSignupTriggerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ReceiptPreSignupTriggerFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt ReceiptIdentityUserPool.Arn

  ReceiptProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: lambda_function.lambda_handler
      Events:
        ReceiptUpload:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref ReceiptBucket
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt ReceiptDeadLetterQueue.Arn
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceiptTable
        - Statement:
            - Effect: Allow
              Action:
                - textract:AnalyzeExpense
              Resource: "*"

  ReceiptApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        AllowOrigins:
          - "*"
      Auth:
        DefaultAuthorizer: ReceiptJwtAuthorizer
        Authorizers:
          ReceiptJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${ReceiptIdentityUserPool}"
              audience:
                - !Ref ReceiptIdentityUserPoolClient

  DashboardApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: dashboard_api.lambda_handler
      Events:
        RootRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /
            Auth:
              Authorizer: NONE
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /health
            Auth:
              Authorizer: NONE
        ReceiptsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /receipts
        SnapshotRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /snapshot
        AnalyticsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /analytics
        ExportRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /exports/csv
        ReviewRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: PATCH
            Path: /receipts/{receiptId}/review
        ClearReceiptsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: POST
            Path: /receipts/clear
        UploadRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: POST
            Path: /uploads
        UploadStatusRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /uploads/status
        WarmSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Input: '{"warmer": true}'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceiptTable
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucket

Outputs:
  ReceiptBucketName:
    Value: !Ref ReceiptBucket
  ReceiptTableName:
    Value: !Ref ReceiptTable
  ReceiptApiUrl:
    Value: !Sub "https://${ReceiptApi}.execute-api.${AWS::Region}.amazonaws.com"
  DashboardApiHealthUrl:
    Value: !Sub "https://${ReceiptApi}.execute-api.${AWS::Region}.amazonaws.com/health"
  ReceiptUserPoolId:
    Value: !Ref ReceiptIdentityUserPool
  ReceiptUserPoolClientId:
    Value: !Ref ReceiptIdentityUserPoolClient
  ReceiptHostedUiBaseUrl:
    Value: !Sub "https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
