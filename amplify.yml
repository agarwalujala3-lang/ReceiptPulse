version: 1
frontend:
  phases:
    build:
      commands:
        - mkdir -p dist
        - |
          printf 'window.RECEIPTPULSE_CONFIG = {\n  apiBaseUrl: "%s",\n  auth: {\n    hostedUiDomain: "%s",\n    clientId: "%s",\n    redirectSignIn: "%s",\n    redirectSignOut: "%s",\n    scopes: ["openid", "email", "profile"],\n  },\n};\n' \
            "${API_BASE_URL:-}" \
            "${COGNITO_HOSTED_UI_DOMAIN:-}" \
            "${COGNITO_CLIENT_ID:-}" \
            "${COGNITO_REDIRECT_SIGN_IN:-}" \
            "${COGNITO_REDIRECT_SIGN_OUT:-}" > dashboard/config.js
        - cp -r dashboard/* dist/
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths: []
